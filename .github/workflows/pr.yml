name: "Specklepy test"
on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
  pull_request:
    branches:
      - "main"

permissions: {} # no permissions by default, override on a per-job basis

concurrency:
  group: ${{ github.workflow }}-pr-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-internal: # Run integration tests against the internal server image
    name: Test (internal)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    permissions:
      contents: read
      packages: read # to pull speckle-server docker images

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install the project
        run: uv sync --all-extras --dev

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # pinned to v4.2.0
        with:
          registry: "ghcr.io"
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run Speckle Server
        run: docker compose --file docker-compose-internal.yml up --detach --wait

      - name: Run tests
        run: uv run pytest --cov --cov-report xml:reports/coverage.xml --junitxml=reports/test-results.xml

      - uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # pinned to v6.0.1
        if: matrix.python-version == 3.14
        with:
          fail_ci_if_error: true # optional (default = false)
          files: ./reports/test-results.xml # optional
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Minimize uv cache
        run: uv cache prune --ci

  test-public: # Run integration tests against the public server image
    name: Test (public)
    runs-on: ubuntu-latest
    env:
      IS_PUBLIC: "true"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
            persist-credentials: false

      - name: Install uv and set the python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install the project
        run: uv sync --all-extras --dev

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # pinned to v5.0.5
        with:
          path: ~/.cache/pre-commit/
          key: ${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run Speckle Server
        run: docker compose --file docker-compose.yml up --detach --wait

      - name: Run tests
        run: uv run pytest --cov --cov-report xml:reports/coverage.xml --junitxml=reports/test-results.xml

      - name: Minimize uv cache
        run: uv cache prune --ci
